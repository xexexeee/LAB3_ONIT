<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-lg mx-auto p-4" style="max-width: 400px; background: white;">
            <h3 class="text-center mb-4">Новый профиль</h3>
            <form method="post">
                <input name="username" class="form-control mb-3" placeholder="Придумайте логин" required>
                <input name="password" type="password" class="form-control mb-3" placeholder="Придумайте пароль" required>
                <button class="btn btn-success w-100 py-2">Создать аккаунт</button>
            </form>
            <hr>
            <p class="text-center mb-0"><a href="/login">Уже есть аккаунт? Войти</a></p>
        </div>
    </div>
</body>
</html>
