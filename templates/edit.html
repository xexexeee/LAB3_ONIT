<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow mx-auto p-4" style="max-width: 500px;">
            <h3>Редактировать данные</h3>
            <hr>
            <form action="/animals/update/{{ animal.id }}" method="post">
                <div class="mb-3">
                    <label class="form-label">Кличка</label>
                    <input name="name" class="form-control" value="{{ animal.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Вид</label>
                    <input name="species" class="form-control" value="{{ animal.species }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Возраст</label>
                    <input name="age" type="number" step="0.1" class="form-control" value="{{ animal.age }}" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
