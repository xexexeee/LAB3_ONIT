<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3799 0%, #0c2461 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; border: none; width: 100%; max-width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div class="card shadow-lg p-4">
        <h3 class="text-center mb-4">Вход</h3>
        <form method="post">
            <input name="username" class="form-control mb-3" placeholder="Логин" required>
            <input name="password" type="password" class="form-control mb-3" placeholder="Пароль" required>
            <button class="btn btn-primary w-100">Войти</button>
        </form>
        {% if error %}
        <p class="text-danger text-center mt-3"><b>{{ error }}</b></p>
        {% endif %}
        <hr>
        <p class="text-center">Нет аккаунта? <a href="/register">Регистрация</a></p>
    </div>
</body>
</html>
