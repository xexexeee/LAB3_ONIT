<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои питомцы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .nav-bar { background: #4834d4; color: white; padding: 15px; border-radius: 0 0 15px 15px; margin-bottom: 25px; }
        .user-label { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body class="container">
    <div class="nav-bar shadow d-flex justify-content-between align-items-center">
        <h4 class="m-0">🐾 Animal Private DB</h4>
        <div>
            <span class="user-label me-2">Аккаунт: <strong>{{ user.username }}</strong></span>
            <a href="/logout" class="btn btn-sm btn-light">Выйти</a>
        </div>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <table class="table align-middle">
            <thead class="table-light">
                <tr>
                    <th>Имя</th>
                    <th>Ви  д</th>
                    <th>Возраст</th>
                    <th class="text-end">Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for a in animals %}
                <tr>
                    <td><strong>{{ a.name }}</strong></td>
                    <td><span class="badge bg-info text-dark">{{ a.species }}</span></td>
                    <td>{{ a.age }} лет</td>
                    <td class="text-end">
                        <a href="/animals/edit/{{ a.id }}" class="btn btn-sm btn-warning">Изменить</a>
                        <a href="/animals/delete/{{ a.id }}" class="btn btn-sm btn-danger">Удалить</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="card shadow-sm border-0 p-4 mt-4 bg-white">
        <h5>Добавить питомца</h5>
        <form action="/animals/add" method="post" class="row g-2 mt-1">
            <div class="col-md-4"><input name="name" class="form-control" placeholder="Кличка" required></div>
            <div class="col-md-3"><input name="species" class="form-control" placeholder="Вид" required></div>
            <div class="col-md-3"><input name="age" type="number" step="0.1" class="form-control" placeholder="Возраст" required></div>
            <div class="col-md-2"><button class="btn btn-success w-100">Добавить</button></div>
        </form>
    </div>
</body>
</html>
